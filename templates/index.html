<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Démo Chatbot IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fb; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: white; border-radius: 20px; padding: 40px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .modal h2 { color: #0066cc; margin-bottom: 10px; font-size: 24px; }
        .modal p { color: #666; margin-bottom: 25px; font-size: 14px; }
        .modal input { width: 100%; padding: 12px 18px; border: 2px solid #e0e0e0; border-radius: 25px; font-size: 15px; margin-bottom: 15px; outline: none; transition: border 0.3s; }
        .modal input:focus { border-color: #0066cc; }
        .modal button { width: 100%; padding: 12px; background: linear-gradient(135deg, #0066cc, #00aaff); color: white; border: none; border-radius: 25px; font-size: 16px; cursor: pointer; transition: opacity 0.2s; }
        .modal button:hover { opacity: 0.9; }
        @keyframes modalAppear { 0% { opacity: 0; transform: translateY(60px) scale(0.92); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        .modal { animation: modalAppear 0.7s cubic-bezier(0.16, 1, 0.3, 1) both; }
        @keyframes overlayAppear { from { opacity: 0; } to { opacity: 1; } }
        .modal-overlay { animation: overlayAppear 0.4s ease-out both; }

        /* CONTAINER */
        .container { width: 100%; max-width: 700px; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; height: 90vh; display: flex; flex-direction: column; }
        .header { background: linear-gradient(135deg, #0066cc, #00aaff); padding: 20px; display: flex; align-items: center; gap: 15px; }
        .avatar { width: 50px; height: 50px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden; }
        .header-info h1 { color: white; font-size: 20px; }
        .header-info p { color: rgba(255,255,255,0.8); font-size: 13px; }
        .status { width: 10px; height: 10px; background: #00ff88; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .badge-demo { background: #ff6600; color: white; font-size: 11px; padding: 3px 10px; border-radius: 10px; margin-left: auto; }

        /* CHAT */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message-user { display: flex; justify-content: flex-end; }
        .message-user span { background: linear-gradient(135deg, #0066cc, #00aaff); color: white; padding: 12px 18px; border-radius: 18px 18px 4px 18px; max-width: 70%; line-height: 1.5; }
        .message-ia { display: flex; justify-content: flex-start; gap: 10px; align-items: flex-end; }
        .message-ia span { background: #f0f4ff; color: #333; padding: 12px 18px; border-radius: 18px 18px 18px 4px; max-width: 70%; line-height: 1.5; }

        /* TYPING */
        .typing { display: none; padding: 0 20px 10px; align-items: center; gap: 10px; }
        .typing.active { display: flex; }
        .typing-dots { background: #f0f4ff; padding: 12px 18px; border-radius: 18px; display: flex; gap: 5px; }
        .typing-dots span { width: 8px; height: 8px; background: #0066cc; border-radius: 50%; animation: bounce 1s infinite; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }

        /* SUGGESTIONS */
        .suggestions { padding: 10px 20px; display: flex; flex-wrap: wrap; gap: 8px; border-top: 1px solid #f0f0f0; }
        .suggestions-label { width: 100%; font-size: 12px; color: #999; margin-bottom: 2px; }
        .btn-suggestion {
            padding: 8px 14px;
            background: #f0f4ff;
            color: #0066cc;
            border: 1px solid #cce0ff;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-suggestion:hover { background: #0066cc; color: white; border-color: #0066cc; }

        /* INPUT */
        .input-zone { padding: 15px 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        #message { flex: 1; padding: 12px 18px; border: 2px solid #e0e0e0; border-radius: 25px; font-size: 15px; outline: none; transition: border 0.3s; }
        #message:focus { border-color: #0066cc; }
        #envoyer { width: 50px; height: 50px; background: linear-gradient(135deg, #0066cc, #00aaff); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        #envoyer svg { width: 20px; height: 20px; fill: white; }
        #micro { width: 50px; height: 50px; background: #f0f4ff; border: 2px solid #cce0ff; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
        #micro:hover { background: #e0ecff; }
        #micro.actif { background: #ff4444; border-color: #ff4444; animation: pulse 1s infinite; }
        #micro svg { width: 20px; height: 20px; fill: #0066cc; }
        #micro.actif svg { fill: white; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4); } 50% { box-shadow: 0 0 0 8px rgba(255,68,68,0); } }
    </style>
</head>
<body>

    <!-- MODAL D'ENTRÉE -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2>🤖 Démo Chatbot IA</h2>
            <p>Entrez le nom de votre entreprise pour voir votre assistant virtuel personnalisé en action !</p>
            <input type="text" id="nom-entreprise" placeholder="Ex: Boulangerie Martin, Garage Dupont..." />
            <input type="text" id="nom-contact" placeholder="Votre prénom" />
            <input type="email" id="email-contact" placeholder="Votre email" />
            <button id="btn-demo" onclick="demarrerDemo()">Voir ma démo personnalisée →</button>
        </div>
    </div>

    <!-- CHAT -->
    <div class="container">
        <div class="header">
            <div class="avatar">
                <svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg" width="50" height="50">
                  <!-- Fond dégradé -->
                  <defs>
                    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                      <stop offset="0%" style="stop-color:#0066cc"/>
                      <stop offset="100%" style="stop-color:#00aaff"/>
                    </linearGradient>
                  </defs>
                  <circle cx="25" cy="25" r="25" fill="url(#bgGrad)"/>
                  <!-- Tête -->
                  <rect x="14" y="13" width="22" height="18" rx="6" fill="white"/>
                  <!-- Yeux lumineux -->
                  <circle cx="20" cy="21" r="3" fill="#0066cc"/>
                  <circle cx="30" cy="21" r="3" fill="#0066cc"/>
                  <circle cx="21" cy="20" r="1" fill="white"/>
                  <circle cx="31" cy="20" r="1" fill="white"/>
                  <!-- Sourire -->
                  <path d="M19 26 Q25 30 31 26" stroke="#0066cc" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                  <!-- Antenne -->
                  <line x1="25" y1="13" x2="25" y2="8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                  <circle cx="25" cy="7" r="2" fill="#00aaff"/>
                  <!-- Corps stylisé -->
                  <rect x="18" y="32" width="14" height="8" rx="4" fill="white" opacity="0.85"/>
                  <!-- Points corps -->
                  <circle cx="22" cy="36" r="1.2" fill="#0066cc"/>
                  <circle cx="25" cy="36" r="1.2" fill="#0066cc"/>
                  <circle cx="28" cy="36" r="1.2" fill="#0066cc"/>
                </svg>
            </div>
            <div class="header-info">
                <h1 id="titre-assistant">Assistant IA</h1>
                <p><span class="status"></span>En ligne — Répond instantanément</p>
            </div>
            <span class="badge-demo">DÉMO GRATUITE</span>
        </div>

        <div id="chat-box"></div>

        <div class="typing" id="typing">
            <div style="width:35px;height:35px;border-radius:50%;overflow:hidden;flex-shrink:0;"><svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg" width="35" height="35"><defs><linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0066cc"/><stop offset="100%" style="stop-color:#00aaff"/></linearGradient></defs><circle cx="25" cy="25" r="25" fill="url(#bg3)"/><rect x="14" y="13" width="22" height="18" rx="6" fill="white"/><circle cx="20" cy="21" r="3" fill="#0066cc"/><circle cx="30" cy="21" r="3" fill="#0066cc"/><circle cx="21" cy="20" r="1" fill="white"/><circle cx="31" cy="20" r="1" fill="white"/><path d="M19 26 Q25 30 31 26" stroke="#0066cc" stroke-width="1.5" fill="none" stroke-linecap="round"/><line x1="25" y1="13" x2="25" y2="8" stroke="white" stroke-width="1.5" stroke-linecap="round"/><circle cx="25" cy="7" r="2" fill="#00aaff"/><rect x="18" y="32" width="14" height="8" rx="4" fill="white" opacity="0.85"/><circle cx="22" cy="36" r="1.2" fill="#0066cc"/><circle cx="25" cy="36" r="1.2" fill="#0066cc"/><circle cx="28" cy="36" r="1.2" fill="#0066cc"/></svg></div>
            <div class="typing-dots"><span></span><span></span><span></span></div>
        </div>

        <!-- BOUTONS DE SUGGESTIONS -->
        <div class="suggestions" id="suggestions">
            <span class="suggestions-label">Questions rapides :</span>
            <button class="btn-suggestion" onclick="suggerer('🚨 Urgences médicales et contacts')">🚨 Urgences</button>
            <button class="btn-suggestion" onclick="suggerer('🥾 Randonnées à faire en Ariège')">🥾 Randonnées</button>
            <button class="btn-suggestion" onclick="suggerer('🛒 Commerces et services proches')">🛒 Commerces</button>
            <button class="btn-suggestion" onclick="suggerer('🌤️ Météo en Ariège')">🌤️ Météo</button>
            <button class="btn-suggestion" onclick="suggerer('🎉 Festivals et événements en Ariège')">🎉 Festivals</button>
            <button class="btn-suggestion" onclick="suggerer('🐾 Vétérinaire d\'urgence')">🐾 Vétérinaire</button>
        </div>

        <div class="input-zone">
            <input type="text" id="message" placeholder="Écrivez ou parlez..." />
            <button id="micro" title="Parler">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 1.93c-3.94-.49-7-3.85-7-7.93h2c0 3.31 2.69 6 6 6s6-2.69 6-6h2c0 4.08-3.06 7.44-7 7.93V21h-2v-5.07z"/></svg>
            </button>
            <button id="envoyer">
                <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
            </button>
        </div>
    </div>

    <script>
        let nomEntreprise = "";
        let historique = [];

        // Détection du secteur → avatar
        function detecterAvatar(nom) {
            const n = nom.toLowerCase();
            if (/boulan|pain|pastiss|biscuit|cake|pâtiss/.test(n)) return "🍞";
            if (/garage|auto|mécani|voiture|carross|pneu|motor/.test(n)) return "🚗";
            if (/coiff|beauty|salon|barbier|ongle|esthé/.test(n)) return "💇";
            if (/restaurant|bistro|brasserie|pizza|kebab|sushi|snack|café|bar/.test(n)) return "🍽️";
            if (/médecin|docteur|cabinet|santé|pharma|kiné|dentiste/.test(n)) return "🩺";
            if (/plomb|électri|chauff|maçon|bâtiment|construct|réno|peintre/.test(n)) return "🔧";
            if (/immobilier|agence|logement|appart/.test(n)) return "🏠";
            if (/hotel|gîte|chambre|héberg/.test(n)) return "🏨";
            if (/camping|camp|tente|plein air/.test(n)) return "⛺";
            if (/fleur|jardin|paysag|plant/.test(n)) return "🌸";
            if (/sport|fitness|gym|coach|yoga/.test(n)) return "💪";
            if (/vétéri|animal|chien|chat|pet/.test(n)) return "🐾";
            if (/informatiq|digital|web|tech|soft|it /.test(n)) return "💻";
            if (/école|cours|formation|prof|tutor/.test(n)) return "📚";
            if (/nettoyage|cleanpro|ménage|entretien|propre/.test(n)) return "🧹";
            if (/transport|livraison|déménag|taxi|logistiq/.test(n)) return "🚚";
            return "🤖"; // défaut
        }

        function demarrerDemo() {
            const entreprise = document.getElementById("nom-entreprise").value.trim();
            const contact = document.getElementById("nom-contact").value.trim();
            const email = document.getElementById("email-contact").value.trim();

            if (!entreprise || !contact || !email) {
                alert("Merci de remplir tous les champs !");
                return;
            }

            nomEntreprise = entreprise;
            const avatar = detecterAvatar(entreprise);
            document.getElementById("modal").style.display = "none";
            document.getElementById("titre-assistant").textContent = `Assistant ${entreprise}`;
            // Met à jour tous les avatars sur la page
            document.querySelectorAll(".avatar").forEach(el => el.textContent = avatar);
            document.querySelectorAll(".avatar-msg").forEach(el => el.textContent = avatar);
            ajouterMessage(`👋 Bonjour ! Je suis l'assistant virtuel de <strong>${entreprise}</strong>. Comment puis-je vous aider aujourd'hui ? / How can I help you?`, "ia");
        }

        document.getElementById("email-contact").addEventListener("keypress", function(e) {
            if (e.key === "Enter") demarrerDemo();
        });

        document.getElementById("envoyer").addEventListener("click", envoyer);
        document.getElementById("message").addEventListener("keypress", function(e) {
            if (e.key === "Enter") envoyer();
        });

        function suggerer(texte) {
            document.getElementById("message").value = texte;
            envoyer();
        }

        // MICRO — Web Speech API
        const btnMicro = document.getElementById("micro");
        let reconnaissance = null;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            reconnaissance = new SR();
            reconnaissance.lang = navigator.language || 'fr-FR';
            reconnaissance.interimResults = false;
            reconnaissance.maxAlternatives = 1;

            reconnaissance.onresult = function(e) {
                const texte = e.results[0][0].transcript;
                document.getElementById("message").value = texte;
                btnMicro.classList.remove("actif");
                envoyer();
            };
            reconnaissance.onerror = function(e) {
                btnMicro.classList.remove("actif");
                const msgs = {
                    'not-allowed': "⛔ Micro bloqué — clique sur le cadenas 🔒 dans la barre d'adresse et autorise le micro.",
                    'no-speech': "🔇 Aucune voix détectée, réessaie.",
                    'audio-capture': "🎤 Aucun micro trouvé sur cet appareil.",
                    'network': "🌐 Erreur réseau, vérifie ta connexion.",
                    'service-not-allowed': "⛔ Service non autorisé. Utilise Chrome sur HTTPS."
                };
                ajouterMessage(msgs[e.error] || `⚠️ Erreur micro : ${e.error}`, "ia");
            };
            reconnaissance.onend = function() {
                btnMicro.classList.remove("actif");
            };

            btnMicro.addEventListener("click", async function() {
                if (btnMicro.classList.contains("actif")) {
                    reconnaissance.stop();
                    btnMicro.classList.remove("actif");
                    return;
                }
                // Demande permission micro avant de lancer
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    stream.getTracks().forEach(t => t.stop()); // libère le micro
                    reconnaissance.lang = navigator.language || 'fr-FR';
                    reconnaissance.start();
                    btnMicro.classList.add("actif");
                } catch(err) {
                    ajouterMessage("⛔ Micro bloqué — clique sur le cadenas 🔒 dans la barre d'adresse et autorise le micro.", "ia");
                }
            });
        } else {
            btnMicro.title = "Micro non supporté sur ce navigateur";
            btnMicro.style.opacity = "0.4";
            btnMicro.style.cursor = "not-allowed";
        }

        async function envoyer() {
            const input = document.getElementById("message");
            const texte = input.value.trim();
            if (!texte) return;

            document.getElementById("suggestions").style.display = "none";

            ajouterMessage(texte, "user");
            input.value = "";
            document.getElementById("typing").classList.add("active");

            try {
                const reponse = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: texte, entreprise: nomEntreprise, historique: historique })
                });
                const data = await reponse.json();
                historique = data.historique;
                ajouterMessage(data.reponse, "ia");
            } catch (err) {
                ajouterMessage("⚠️ Erreur de connexion, veuillez réessayer.", "ia");
            } finally {
                document.getElementById("typing").classList.remove("active");
            }
        }

        function ajouterMessage(texte, qui) {
            const box = document.getElementById("chat-box");
            const div = document.createElement("div");
            div.className = `message-${qui}`;
            if (qui === "ia") {
                const av = nomEntreprise ? detecterAvatar(nomEntreprise) : null;
                const avatarHtml = av && av !== "🤖"
                    ? `<div class="avatar-msg" style="width:35px;height:35px;background:linear-gradient(135deg,#0066cc,#00aaff);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">${av}</div>`
                    : `<div class="avatar-msg" style="width:35px;height:35px;border-radius:50%;flex-shrink:0;overflow:hidden;"><svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg" width="35" height="35"><defs><linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0066cc"/><stop offset="100%" style="stop-color:#00aaff"/></linearGradient></defs><circle cx="25" cy="25" r="25" fill="url(#bg2)"/><rect x="14" y="13" width="22" height="18" rx="6" fill="white"/><circle cx="20" cy="21" r="3" fill="#0066cc"/><circle cx="30" cy="21" r="3" fill="#0066cc"/><circle cx="21" cy="20" r="1" fill="white"/><circle cx="31" cy="20" r="1" fill="white"/><path d="M19 26 Q25 30 31 26" stroke="#0066cc" stroke-width="1.5" fill="none" stroke-linecap="round"/><line x1="25" y1="13" x2="25" y2="8" stroke="white" stroke-width="1.5" stroke-linecap="round"/><circle cx="25" cy="7" r="2" fill="#00aaff"/><rect x="18" y="32" width="14" height="8" rx="4" fill="white" opacity="0.85"/><circle cx="22" cy="36" r="1.2" fill="#0066cc"/><circle cx="25" cy="36" r="1.2" fill="#0066cc"/><circle cx="28" cy="36" r="1.2" fill="#0066cc"/></svg></div>`;
                div.innerHTML = `${avatarHtml}<span>${texte}</span>`;
            } else {
                div.innerHTML = `<span>${texte}</span>`;
            }
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
